name: Windows CUDA Build

on:
  push:
    branches: [ dev, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ dev, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  test-plugin-venv:
    if: github.repository == 'MrNeRF/LichtFeld-Studio' || github.event.pull_request.base.repo.full_name == 'MrNeRF/LichtFeld-Studio'
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download Python embeddable
        shell: pwsh
        run: |
          Invoke-WebRequest "https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip" -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath python-embed

      - name: Test uv sync with embedded Python
        shell: pwsh
        run: |
          $PYTHON = "$PWD\python-embed\python.exe"

          # Create minimal test plugin
          $PLUGIN = "$env:TEMP\test_plugin"
          New-Item -ItemType Directory -Force -Path $PLUGIN
          @"
          [project]
          name = "test-plugin"
          version = "0.1.0"
          requires-python = ">=3.12"
          dependencies = []
          "@ | Set-Content "$PLUGIN\pyproject.toml"

          # Test 1: uv sync creates venv
          uv sync --project $PLUGIN --python $PYTHON
          if (-not (Test-Path "$PLUGIN\.venv\Scripts\python.exe")) {
            Write-Error "FAIL: venv python not created"
            exit 1
          }
          Write-Host "PASS: uv sync created venv with python.exe"

          # Test 2: broken venv recovery
          Remove-Item "$PLUGIN\.venv\Scripts\python.exe"
          uv sync --project $PLUGIN --python $PYTHON
          if (-not (Test-Path "$PLUGIN\.venv\Scripts\python.exe")) {
            Write-Error "FAIL: broken venv not recovered"
            exit 1
          }
          Write-Host "PASS: uv sync recovered broken venv"

          # Test 3: uv sync works when PYTHONHOME is set (simulates in-app environment)
          Remove-Item -Recurse -Force "$PLUGIN\.venv"
          $env:PYTHONHOME = "$PWD\python-embed"
          uv sync --project $PLUGIN --python $PYTHON
          $env:PYTHONHOME = $null
          if (-not (Test-Path "$PLUGIN\.venv\Scripts\python.exe")) {
            Write-Error "FAIL: uv sync failed with PYTHONHOME set"
            exit 1
          }
          Write-Host "PASS: uv sync works with PYTHONHOME set"

          # Test 4: uv sync works when PYTHONHOME points to wrong location
          Remove-Item -Recurse -Force "$PLUGIN\.venv"
          $env:PYTHONHOME = "C:\nonexistent\path"
          uv sync --project $PLUGIN --python $PYTHON
          $env:PYTHONHOME = $null
          if (-not (Test-Path "$PLUGIN\.venv\Scripts\python.exe")) {
            Write-Error "FAIL: uv sync failed with wrong PYTHONHOME"
            exit 1
          }
          Write-Host "PASS: uv sync resilient to wrong PYTHONHOME"

  build-windows:
    if: github.repository == 'MrNeRF/LichtFeld-Studio' || github.event.pull_request.base.repo.full_name == 'MrNeRF/LichtFeld-Studio'
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
    env:
      VCPKG_ROOT: ${{ github.workspace }}\..\vcpkg
      VCPKG_BUILD_TYPE: release
      CUDA_PATH: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v12.8"
      CUDNN_ROOT_DIR: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v12.8"
      BUILD_DIR: b

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install CUDA 12.8
        run: |
          cd ..
          Invoke-WebRequest https://developer.download.nvidia.com/compute/cuda/12.8.0/local_installers/cuda_12.8.0_571.96_windows.exe -OutFile cuda.exe -Verbose
          Start-Process -FilePath .\cuda.exe -ArgumentList "-y -s -accepteula -toolkit -override -noDisplayDriver" -Wait

      - name: Set CUDA environment
        run: |
          echo "CUDA_PATH=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CUDA_PATH_V12_8=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CUDNN_ROOT_DIR=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8\libnvvp" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Ensure cuDNN is available
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $cudaPath = 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8'
          $include = Join-Path $cudaPath 'include\cudnn.h'
          $libs = @(Get-ChildItem (Join-Path $cudaPath 'lib\x64') -Filter 'cudnn*.lib' -ErrorAction SilentlyContinue)
          $dlls = @(Get-ChildItem (Join-Path $cudaPath 'bin') -Filter 'cudnn*64_9.dll' -ErrorAction SilentlyContinue)
          if ((Test-Path $include) -and $libs.Count -gt 0 -and $dlls.Count -gt 0) {
            Write-Host "Using provided cuDNN:"
            $libs | Select-Object -First 5 | ForEach-Object { Write-Host $_.FullName }
            $dlls | Select-Object -First 5 | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "cuDNN 9 was not provided by the runner image; installing cuDNN 9.5.0 for CUDA 12 from NVIDIA redist."
            $url = 'https://developer.download.nvidia.com/compute/cudnn/redist/cudnn/windows-x86_64/cudnn-windows-x86_64-9.5.0.50_cuda12-archive.zip'
            Invoke-WebRequest $url -OutFile cudnn.zip -Verbose
            Expand-Archive cudnn.zip -DestinationPath cudnn
            $root = Get-ChildItem cudnn -Directory | Select-Object -First 1
            if (-not $root) {
              throw "Could not find extracted cuDNN archive root."
            }
            Copy-Item "$($root.FullName)\bin\*" (Join-Path $cudaPath 'bin') -Recurse -Force
            Copy-Item "$($root.FullName)\include\*" (Join-Path $cudaPath 'include') -Recurse -Force
            Copy-Item "$($root.FullName)\lib\x64\*" (Join-Path $cudaPath 'lib\x64') -Recurse -Force
          }
          if (-not (Test-Path $include)) {
            throw "cuDNN header was not found after setup: $include"
          }
          $libs = @(Get-ChildItem (Join-Path $cudaPath 'lib\x64') -Filter 'cudnn*.lib' -ErrorAction SilentlyContinue)
          $dlls = @(Get-ChildItem (Join-Path $cudaPath 'bin') -Filter 'cudnn*64_9.dll' -ErrorAction SilentlyContinue)
          if ($libs.Count -eq 0 -or $dlls.Count -eq 0) {
            throw "cuDNN 9 library or DLL was not found after setup."
          }
          "CUDNN_ROOT_DIR=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache vcpkg tool
        id: cache-vcpkg-tool
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}
          key: vcpkg-tool-${{ runner.os }}-2026-02-21
          restore-keys: vcpkg-tool-${{ runner.os }}-

      - name: Setup vcpkg
        if: steps.cache-vcpkg-tool.outputs.cache-hit != 'true'
        run: |
          cd ..
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg_installed
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/vcpkg_installed
          key: vcpkg-installed-${{ runner.os }}-prebuilt-ort-v1-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: vcpkg-installed-${{ runner.os }}-prebuilt-ort-v1-

      - name: Configure
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -B %BUILD_DIR% -S . -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DLFS_FAST_COMPILE=ON -DBUILD_PYTHON_STUBS=OFF -DLFS_DEV_IMPORT_SOURCE_PYTHON=OFF -DLFS_DEV_IMPORT_SOURCE_RESOURCES=OFF -DLFS_ENABLE_CUDA_DEVICE_DEBUG=OFF

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set PATH=%CD%\%BUILD_DIR%;%CD%\%BUILD_DIR%\vcpkg_installed\x64-windows\bin;%PATH%
          cmake --build %BUILD_DIR% -j %NUMBER_OF_PROCESSORS%

      - name: Verify nvJPEG2000 runtime bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $runtime = Join-Path $env:BUILD_DIR 'nvjpeg2k_0.dll'
          $extensionDir = Join-Path $env:BUILD_DIR 'extensions'
          $extensions = @(Get-ChildItem $extensionDir -Filter 'nvjpeg2k_ext*.dll' -ErrorAction SilentlyContinue)
          if (-not (Test-Path $runtime)) {
            throw "nvJPEG2000 runtime DLL was not bundled next to the binary: $runtime"
          }
          if ($extensions.Count -eq 0) {
            throw "nvjpeg2k extension DLL was not bundled in $extensionDir"
          }
          Write-Host "Found nvJPEG2000 runtime: $runtime"
          $extensions | ForEach-Object { Write-Host "Found nvjpeg2k extension: $($_.FullName)" }

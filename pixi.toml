[workspace]
authors = ["LichtFeld Studio contributors"]
channels = ["conda-forge", "nvidia"]
name = "lichtfeld-studio"
platforms = ["linux-64"]
version = "0.5.3"

[dependencies]
cmake = "3.30.*"
ninja = "*"
ccache = "*"
nasm = "*"
autoconf = "*"
autoconf-archive = "*"
automake = "*"
libtool = "*"
git = "*"
pkg-config = "*"
python = "3.12.*"
gtk3 = "*"
gxx_linux-64 = "13.*"
cuda-toolkit = "12.8.2.*"
xorg-libx11 = "*"
xorg-libxext = "*"
xorg-libxcursor = "*"
xorg-xproto = "*"
xorg-kbproto = "*"
xorg-xextproto = "*"
xorg-renderproto = "*"
xorg-fixesproto = "*"
xorg-inputproto = "*"
xorg-randrproto = "*"

[tasks]
bootstrap-vcpkg = { cmd = "sh scripts/bootstrap_vcpkg.sh" }
configure = { cmd = "sh scripts/configure_with_pixi.sh", depends-on = ["bootstrap-vcpkg"] }
build = { cmd = "sh scripts/build_with_pixi.sh", depends-on = ["configure"] }
clean = { cmd = "cmake --build --preset dev-release --target clean", depends-on = ["configure"] }
